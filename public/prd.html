<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spectrum OS — PRD v1.0</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ec;
      --muted: #8b8fa8;
      --accent: #7c6aff;
      --accent2: #06b6d4;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.7;
    }
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* TOC Sidebar */
    .toc {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    .toc-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 0 8px;
    }
    .toc a {
      display: block;
      padding: 5px 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      border-radius: 6px;
      transition: all 0.15s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toc a:hover { color: var(--text); background: var(--border); }
    .toc a.h2 { font-weight: 600; color: var(--text); margin-top: 8px; }
    .toc a.h3 { padding-left: 20px; font-size: 12px; }

    /* Main */
    .main {
      flex: 1;
      max-width: 860px;
      padding: 48px 40px;
      margin: 0 auto;
    }

    /* Header banner */
    .doc-header {
      background: linear-gradient(135deg, #7c6aff22, #06b6d422);
      border: 1px solid #7c6aff44;
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 40px;
    }
    .doc-header h1 {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(90deg, #7c6aff, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .doc-meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: var(--border);
      color: var(--muted);
    }
    .badge.accent { background: #7c6aff22; color: #a59aff; }
    .badge.cyan { background: #06b6d422; color: #67e8f9; }
    .badge.yellow { background: #eab30822; color: #fde047; }

    /* Content */
    #content h1 { display: none; }
    #content h2 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin: 48px 0 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    #content h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent2);
      margin: 28px 0 12px;
    }
    #content h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 20px 0 8px;
    }
    #content p { margin-bottom: 14px; font-size: 14.5px; color: #c8cadb; }
    #content strong { color: var(--text); }
    #content ul, #content ol {
      margin: 10px 0 14px 20px;
      font-size: 14px;
      color: #c8cadb;
    }
    #content li { margin-bottom: 5px; }
    #content blockquote {
      border-left: 3px solid var(--accent);
      padding: 10px 16px;
      margin: 16px 0;
      background: #7c6aff11;
      border-radius: 0 6px 6px 0;
      color: #a59aff;
      font-size: 14px;
    }

    /* Tables */
    #content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0 24px;
      font-size: 13.5px;
    }
    #content thead {
      background: var(--surface);
    }
    #content th {
      padding: 10px 14px;
      text-align: left;
      font-weight: 600;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    #content td {
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      color: #c8cadb;
    }
    #content tr:hover td { background: #ffffff08; }
    #content td:first-child { font-weight: 500; color: var(--text); }

    /* Code blocks */
    #content pre {
      background: #0a0c14;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 16px 0;
      font-size: 13px;
      line-height: 1.6;
    }
    #content code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #a5f3fc;
    }
    #content p code, #content li code {
      background: #7c6aff18;
      color: #a59aff;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }

    /* Emoji status */
    #content td:has(> :first-child:contains("✅")) { color: var(--green); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 768px) {
      .toc { display: none; }
      .main { padding: 24px 20px; }
    }
  </style>
</head>
<body>
<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">목차</div>
  </nav>

  <main class="main">
    <div class="doc-header">
      <h1>Spectrum OS</h1>
      <div class="doc-meta">
        <span class="badge accent">PRD v1.0</span>
        <span class="badge cyan">2026-03-20</span>
        <span class="badge yellow">v1.0 확정</span>
        <span class="badge">작성: Milo (COO)</span>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<script>
const PRD_URL = 'https://raw.githubusercontent.com/cranverry/ops-bot/main/docs/PRD-ops-bot.md';

async function loadPRD() {
  const content = document.getElementById('content');
  const toc = document.getElementById('toc');

  content.innerHTML = '<p style="color:var(--muted);padding:20px">로딩 중...</p>';

  try {
    const res = await fetch(PRD_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('Fetch failed: ' + res.status);
    const md = await res.text();

    content.innerHTML = marked.parse(md);

    // TOC 생성
    const headings = document.querySelectorAll('#content h2, #content h3');
    headings.forEach((h, i) => {
      const id = 'heading-' + i;
      h.id = id;
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      a.className = h.tagName.toLowerCase();
      toc.appendChild(a);
    });

    // 메타 배지 업데이트 (PRD 첫 줄에서 버전 파싱)
    const versionMatch = md.match(/버전:\s*([\d.]+)/);
    const dateMatch = md.match(/작성일:\s*([\d-]+)/);
    const statusMatch = md.match(/상태:\s*\*\*(.+?)\*\*/);
    if (versionMatch) document.querySelector('.badge.accent').textContent = 'PRD v' + versionMatch[1];
    if (dateMatch) document.querySelector('.badge.cyan').textContent = dateMatch[1];
    if (statusMatch) document.querySelector('.badge.yellow').textContent = statusMatch[1];

  } catch (e) {
    content.innerHTML = '<p style="color:var(--red)">PRD 로드 실패: ' + e.message + '<br><small>URL: ' + PRD_URL + '</small></p>';
  }
}

loadPRD();
</script>
</body>
</html>
